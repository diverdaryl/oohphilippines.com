<title>Payment Successful — OOHPhilippines.com</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

.logo {
    font-size: 20px;
    font-weight: 700;
    color: #1565c0;
    letter-spacing: -0.5px;
    margin-bottom: 28px;
}

.check-circle {
    width: 80px;
    height: 80px;
    background: #e8f5e9;
    border: 3px solid #66bb6a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
    animation: popIn 0.5s 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
}

h1 {
    font-size: 32px;
    font-weight: 800;
    color: #1565c0;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
}

p {
    font-size: 16px;
    color: #607d8b;
    line-height: 1.6;
    margin-bottom: 32px;
}

.actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.btn {
    padding: 13px 24px;
    border-radius: 10px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
    border: none;
}

.btn-primary {
    background: linear-gradient(135deg, #e65100, #bf360c);
    color: white;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }

.btn-outline {
    background: white;
    color: #1565c0;
    border: 2px solid #1565c0;
}
.btn-outline:hover { background: #e3f2fd; transform: translateY(-2px); }

.footnote {
    margin-top: 24px;
    font-size: 12px;
    color: #b0bec5;
}

    <p>Your subscription is now active. A confirmation will be sent to your email shortly. Welcome to OOHPhilippines!</p>
    <div class="actions">
      <a href="index.html" class="btn btn-primary">Go to Directory →</a>
      <a href="pricing.html" class="btn btn-outline">View Plans</a>
    </div>
    <div class="footnote">Secured by PayMongo · QR Ph</div>
  </div>
